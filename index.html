<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول الأطباء</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628;
    --navy2: #0d1f3c;
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.18);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.15);
    --purple: #a78bfa;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #e8f0fe;
    --muted: #94a3b8;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.04);
    --hover: rgba(255,255,255,0.06);
  }
  body {
    font-family: 'Cairo', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 50%, var(--navy) 100%);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }
  button { cursor: pointer; font-family: inherit; }
  input  { font-family: inherit; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    height: 60px;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 700; color: var(--blue); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 3px; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 3px; }
  .tab-btn {
    padding: 6px 14px; border-radius: 7px; border: none;
    font-size: 13px; font-weight: 600; transition: all .2s;
    background: transparent; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .tab-btn.active { background: rgba(96,165,250,0.2); color: var(--blue); }
  .count-badge {
    background: rgba(96,165,250,0.25); color: var(--blue);
    border-radius: 10px; padding: 0 6px; font-size: 11px; font-weight: 700;
  }

  /* ── Sync button ── */
  .sync-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--muted); font-size: 12px; font-weight: 600;
    transition: all .3s;
  }
  .sync-btn.syncing { color: var(--yellow); }
  .sync-btn.ok      { color: var(--green); }
  .sync-btn.err     { color: var(--red); }
  .sync-icon { width: 14px; height: 14px; display: inline-flex; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; }

  /* ── Body ── */
  .body { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

  /* ── Banner ── */
  .banner {
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 12px; padding: 12px 16px;
    margin-bottom: 16px; font-size: 13px; color: var(--yellow);
    display: flex; align-items: flex-start; gap: 8px; line-height: 1.6;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }

  /* ── Month nav ── */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: rgba(96,165,250,0.08);
    border-bottom: 1px solid var(--border);
  }
  .month-title { font-size: 19px; font-weight: 700; color: #93c5fd; }
  .nav-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: var(--hover); color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Schedule table ── */
  .table-head {
    display: grid; grid-template-columns: 48px 104px 1fr 48px;
    padding: 9px 14px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .04em;
  }
  .table-head div:first-child, .table-head div:last-child { text-align: center; }
  .sched-row {
    display: grid; grid-template-columns: 48px 104px 1fr 48px;
    padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
    align-items: center; min-height: 42px; transition: background .15s;
  }
  .sched-row.weekend { background: rgba(167,139,250,0.05); }
  .sched-row.has-docs { background: rgba(96,165,250,0.04); }
  .day-num { font-size: 15px; font-weight: 700; text-align: center; color: var(--blue); }
  .day-num.weekend { color: var(--purple); }
  .day-name { font-size: 13px; font-weight: 600; color: #93c5fd; }
  .day-name.weekend { color: #c4b5fd; }
  .doc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .doc-tag {
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    background: var(--green-dim); color: #6ee7b7;
    border: 1px solid rgba(52,211,153,0.25);
  }
  .no-doc { font-size: 12px; color: #374151; font-style: italic; }
  .count-cell { display: flex; justify-content: center; }
  .count-dot {
    min-width: 26px; height: 26px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .count-dot.zero   { background: rgba(239,68,68,0.12); color: var(--red);    border: 1px solid rgba(239,68,68,0.2); }
  .count-dot.low    { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
  .count-dot.good   { background: var(--green-dim);      color: var(--green);  border: 1px solid rgba(52,211,153,0.2); }

  /* ── Doctors list ── */
  .dr-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  .dr-header-title { font-size: 15px; font-weight: 700; color: #e2e8f0; }
  .add-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 9px; border: none;
    background: var(--blue-dim); color: #93c5fd;
    font-size: 13px; font-weight: 600;
  }
  .dr-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .dr-name { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; }
  .day-pills { display: flex; gap: 4px; flex-wrap: wrap; }
  .day-pill {
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
    background: rgba(255,255,255,0.04); color: #374151; border: 1px solid transparent;
  }
  .day-pill.active        { background: rgba(96,165,250,0.2);  color: #93c5fd; border-color: rgba(96,165,250,0.25); }
  .day-pill.active.weekend{ background: rgba(167,139,250,0.25); color: #c4b5fd; border-color: rgba(167,139,250,0.3); }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 7px; border: none;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 14px; height: 14px; }
  .btn-edit   { background: rgba(251,191,36,0.1); color: var(--yellow); }
  .btn-delete { background: rgba(239,68,68,0.1);  color: var(--red); }
  .icon-btns  { display: flex; gap: 5px; margin-right: 10px; }
  .empty-state { padding: 36px; text-align: center; color: #374151; font-size: 14px; }

  /* ── Form ── */
  .form-card {
    border-radius: 12px; padding: 18px; margin-bottom: 12px;
    background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.18);
  }
  .form-card.editing {
    background: rgba(251,191,36,0.05); border-color: rgba(251,191,36,0.15);
  }
  .form-card.editing-inline { margin: 12px 18px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
  .form-label.editing { color: var(--yellow); }
  .form-input {
    width: 100%; padding: 9px 13px; border-radius: 9px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: var(--text);
    font-size: 14px; outline: none; direction: rtl;
  }
  .form-input:focus { border-color: rgba(96,165,250,0.4); }
  .day-toggles { display: flex; gap: 3px; margin-top: 10px; }
  .day-toggle {
    flex: 1; padding: 7px 2px; border-radius: 7px; border: none;
    font-size: 11px; font-weight: 700; transition: all .15s;
    background: rgba(255,255,255,0.05); color: #475569;
  }
  .day-toggle.active         { background: rgba(96,165,250,0.25);  color: #93c5fd; }
  .day-toggle.active.weekend { background: rgba(167,139,250,0.3);  color: #c4b5fd; }
  .form-actions { display: flex; gap: 8px; margin-top: 13px; justify-content: flex-end; }
  .btn-save {
    padding: 8px 18px; border-radius: 9px; border: none;
    background: var(--green-dim); color: var(--green);
    font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px;
  }
  .btn-save.editing { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .btn-cancel {
    padding: 8px 14px; border-radius: 9px; border: none;
    background: var(--hover); color: #64748b; font-size: 13px; font-weight: 600;
  }

  /* ── Flash ── */
  @keyframes fadeUp {
    from { opacity:0; transform: translateX(-50%) translateY(10px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }
  .flash {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 11px 22px; border-radius: 12px; z-index: 999;
    font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeUp .3s ease;
  }
  .flash.success { background: rgba(52,211,153,0.95); }
  .flash.error   { background: rgba(239,68,68,0.95); }

  /* ── SVG icons ── */
  svg { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">🏥 <span>جدول الأطباء</span></div>
  <div class="header-right">
    <button class="sync-btn" id="syncBtn" onclick="manualSync()">
      <span class="sync-icon" id="syncIcon"></span>
      <span id="syncLabel">تحديث</span>
    </button>
    <div class="tabs">
      <button class="tab-btn active" id="tabSchedule" onclick="switchTab('schedule')">
        📅 الجدول
      </button>
      <button class="tab-btn" id="tabDoctors" onclick="switchTab('doctors')">
        👨‍⚕️ الأطباء <span class="count-badge" id="drCount">0</span>
      </button>
    </div>
  </div>
</header>

<div class="body">
  <div class="banner" id="setupBanner" style="display:none">
    ⚙️ &nbsp;البيانات محفوظة محلياً فقط — لتفعيل الحفظ الدائم: انشر الـ Apps Script وضع الـ URL في متغير <code>API_URL</code> في الكود
  </div>

  <!-- Schedule Tab -->
  <div id="scheduleTab">
    <div class="card">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
        <div class="month-title" id="monthTitle"></div>
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      </div>
      <div class="table-head">
        <div>يوم</div><div>اليوم</div><div>الأطباء المتاحون</div><div>عدد</div>
      </div>
      <div id="scheduleBody"></div>
    </div>
  </div>

  <!-- Doctors Tab -->
  <div id="doctorsTab" style="display:none">
    <div id="addFormContainer"></div>
    <div class="card">
      <div class="dr-header">
        <div class="dr-header-title">قائمة الأطباء <span style="font-size:13px;color:#64748b;font-weight:400" id="drCountLabel"></span></div>
        <button class="add-btn" id="addBtnEl" onclick="showAddForm()">＋ إضافة طبيب</button>
      </div>
      <div id="doctorsList"></div>
    </div>
  </div>
</div>

<div id="flashEl" class="flash" style="display:none"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG — paste your Apps Script URL here after deploying
// ══════════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbxaTLxhn-jIC9hKPnGIjGkKHUBRGMHvGUan_ok6kHqpoGVnEgSsasOzRWeIOJvbLWN78w/exec";

// ── Constants ─────────────────────────────────────────────────
const DAYS       = ["الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت","الأحد"];
const DAYS_SHORT = ["إث","ثل","أر","خم","جم","سب","أح"];
const MONTHS     = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const CACHE_KEY  = "dr_schedule_v3";
const configured = API_URL !== "https://script.google.com/macros/s/AKfycbxaTLxhn-jIC9hKPnGIjGkKHUBRGMHvGUan_ok6kHqpoGVnEgSsasOzRWeIOJvbLWN78w/exec";

// ── State ─────────────────────────────────────────────────────
let doctors  = [];
let curMonth = new Date().getMonth();
let curYear  = new Date().getFullYear();
let curTab   = "schedule";
let editingId = null;
let addingOpen = false;
let newDays  = Array(7).fill(false);
let saveTimer = null;

// ── Cache ─────────────────────────────────────────────────────
function readCache() { try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || []; } catch { return []; } }
function writeCache(d) { try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch {} }

// ── API ───────────────────────────────────────────────────────
async function apiLoad() {
  const res = await fetch(API_URL, { redirect: "follow" });
  const data = await res.json();
  return data.doctors || [];
}
async function apiSave(docs) {
  await fetch(API_URL, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ doctors: docs }),
  });
}

// ── Sync helpers ──────────────────────────────────────────────
function setSyncStatus(s) {
  const btn = document.getElementById("syncBtn");
  const lbl = document.getElementById("syncLabel");
  const ico = document.getElementById("syncIcon");
  btn.className = "sync-btn " + s;
  ico.innerHTML = syncSVG();
  ico.style.animation = s === "syncing" ? "spin 1s linear infinite" : "none";
  lbl.textContent = { idle:"تحديث", syncing:"جاري الحفظ…", ok:"تم الحفظ ✓", err:"خطأ في الحفظ" }[s] || "تحديث";
  if (s === "ok") setTimeout(() => setSyncStatus("idle"), 2000);
}

function scheduleSave() {
  writeCache(doctors);
  if (!configured) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncStatus("syncing");
    try { await apiSave(doctors); setSyncStatus("ok"); }
    catch { setSyncStatus("err"); }
  }, 1500);
}

async function manualSync() {
  if (!configured) { showFlash("لم يتم تكوين الـ API URL بعد", "error"); return; }
  setSyncStatus("syncing");
  try {
    doctors = await apiLoad();
    writeCache(doctors);
    setSyncStatus("ok");
    render();
    showFlash("تم التحديث ✓");
  } catch { setSyncStatus("err"); showFlash("فشل التحديث", "error"); }
}

// ── Helpers ───────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function weekdayIdx(y, m, d) { return (new Date(y, m, d).getDay() + 6) % 7; }
function daysInMonth(y, m)   { return new Date(y, m + 1, 0).getDate(); }
function showFlash(msg, type="success") {
  const el = document.getElementById("flashEl");
  el.textContent = msg; el.className = "flash " + type; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 2200);
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(t) {
  curTab = t;
  document.getElementById("scheduleTab").style.display = t === "schedule" ? "" : "none";
  document.getElementById("doctorsTab").style.display  = t === "doctors"  ? "" : "none";
  document.getElementById("tabSchedule").className = "tab-btn" + (t==="schedule"?" active":"");
  document.getElementById("tabDoctors").className  = "tab-btn" + (t==="doctors" ?" active":"");
}

// ── Month navigation ──────────────────────────────────────────
function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderSchedule();
}

// ── SVG icons ─────────────────────────────────────────────────
function syncSVG()  { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>`; }
function checkSVG() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`; }
function editSVG()  { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`; }
function trashSVG() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`; }

// ── Day toggles HTML ──────────────────────────────────────────
function dayTogglesHTML(days, prefix) {
  return `<div class="day-toggles">${DAYS_SHORT.map((d,i) => {
    const we = i >= 4 ? " weekend" : "";
    const ac = days[i] ? " active" : "";
    return `<button class="day-toggle${ac}${we}" onclick="${prefix}ToggleDay(${i})">${d}</button>`;
  }).join("")}</div>`;
}

// ── Render Schedule ───────────────────────────────────────────
function renderSchedule() {
  document.getElementById("monthTitle").textContent = `${MONTHS[curMonth]} ${curYear}`;
  const total = daysInMonth(curYear, curMonth);
  let html = "";
  for (let day = 1; day <= total; day++) {
    const wi = weekdayIdx(curYear, curMonth, day);
    const avail = doctors.filter(d => d.name && d.days[wi]);
    const we    = wi >= 4;
    const cls   = we ? "weekend" : avail.length > 0 ? "has-docs" : "";
    const countCls = avail.length === 0 ? "zero" : avail.length >= 3 ? "good" : "low";
    const tags = avail.length > 0
      ? avail.map(d => `<span class="doc-tag">${d.name}</span>`).join("")
      : `<span class="no-doc">لا يوجد أطباء</span>`;
    html += `<div class="sched-row ${cls}">
      <div class="day-num${we?" weekend":""}">${day}</div>
      <div class="day-name${we?" weekend":""}">${DAYS[wi]}</div>
      <div class="doc-tags">${tags}</div>
      <div class="count-cell"><div class="count-dot ${countCls}">${avail.length}</div></div>
    </div>`;
  }
  document.getElementById("scheduleBody").innerHTML = html;
}

// ── Render Doctors ────────────────────────────────────────────
function renderDoctors() {
  document.getElementById("drCount").textContent = doctors.length;
  document.getElementById("drCountLabel").textContent = `(${doctors.length})`;

  let html = "";
  if (doctors.length === 0) {
    html = `<div class="empty-state">لا يوجد أطباء — أضف طبيباً جديداً</div>`;
  } else {
    doctors.forEach(doc => {
      if (editingId === doc.id) {
        html += `<div class="form-card editing editing-inline">
          <div class="form-label editing">تعديل بيانات الدكتور</div>
          <input class="form-input" id="editInput" value="${doc.name}" onkeydown="if(event.key==='Enter')saveEdit()">
          ${dayTogglesHTML(editingDays, "edit")}
          <div class="form-actions">
            <button class="btn-cancel" onclick="cancelEdit()">إلغاء</button>
            <button class="btn-save editing" onclick="saveEdit()">${checkSVG()} حفظ</button>
          </div>
        </div>`;
      } else {
        const pills = DAYS_SHORT.map((d,i) => {
          const ac = doc.days[i] ? " active" : "";
          const we = i >= 4 ? " weekend" : "";
          return `<span class="day-pill${ac}${we}">${d}</span>`;
        }).join("");
        html += `<div class="dr-row">
          <div style="flex:1">
            <div class="dr-name">${doc.name}</div>
            <div class="day-pills">${pills}</div>
          </div>
          <div class="icon-btns">
            <button class="icon-btn btn-edit"   onclick="startEdit('${doc.id}')">${editSVG()}</button>
            <button class="icon-btn btn-delete" onclick="deleteDoctor('${doc.id}')">${trashSVG()}</button>
          </div>
        </div>`;
      }
    });
  }
  document.getElementById("doctorsList").innerHTML = html;
}

function render() { renderSchedule(); renderDoctors(); }

// ── Add form ──────────────────────────────────────────────────
function showAddForm() {
  addingOpen = true;
  newDays = Array(7).fill(false);
  document.getElementById("addBtnEl").style.display = "none";
  document.getElementById("addFormContainer").innerHTML = `
    <div class="form-card">
      <div class="form-label">دكتور جديد</div>
      <input class="form-input" id="newNameInput" placeholder="اسم الدكتور..." onkeydown="if(event.key==='Enter')addDoctor()" autofocus>
      ${dayTogglesHTML(newDays, "new")}
      <div class="form-actions">
        <button class="btn-cancel" onclick="cancelAdd()">إلغاء</button>
        <button class="btn-save" onclick="addDoctor()">${checkSVG()} إضافة</button>
      </div>
    </div>`;
}

function cancelAdd() {
  addingOpen = false;
  document.getElementById("addBtnEl").style.display = "";
  document.getElementById("addFormContainer").innerHTML = "";
}

function newToggleDay(i) {
  newDays[i] = !newDays[i];
  // re-render toggles only
  document.querySelector("#addFormContainer .day-toggles").outerHTML =
    `<div class="day-toggles">${DAYS_SHORT.map((d,j) => {
      const we = j>=4?" weekend":""; const ac = newDays[j]?" active":"";
      return `<button class="day-toggle${ac}${we}" onclick="newToggleDay(${j})">${d}</button>`;
    }).join("")}</div>`;
  // safer: just rebuild
  const tog = document.querySelector("#addFormContainer .day-toggles");
  if(tog) tog.outerHTML = buildToggles(newDays, "new");
}

function addDoctor() {
  const name = document.getElementById("newNameInput")?.value.trim();
  if (!name) return;
  doctors.push({ id: uid(), name, days: [...newDays] });
  cancelAdd();
  scheduleSave();
  render();
  showFlash("تمت إضافة الدكتور ✓");
}

// ── Edit ──────────────────────────────────────────────────────
let editingDays = [];
function startEdit(id) {
  const doc = doctors.find(d => d.id === id);
  if (!doc) return;
  editingId   = id;
  editingDays = [...doc.days];
  renderDoctors();
  document.getElementById("editInput")?.focus();
}

function editToggleDay(i) {
  editingDays[i] = !editingDays[i];
  renderDoctors();
  document.getElementById("editInput")?.focus();
}

function saveEdit() {
  const name = document.getElementById("editInput")?.value.trim();
  if (!name) return;
  doctors = doctors.map(d => d.id === editingId ? { ...d, name, days: [...editingDays] } : d);
  editingId = null;
  scheduleSave();
  render();
  showFlash("تم الحفظ ✓");
}

function cancelEdit() { editingId = null; renderDoctors(); }

// ── Delete ────────────────────────────────────────────────────
function deleteDoctor(id) {
  doctors = doctors.filter(d => d.id !== id);
  scheduleSave();
  render();
  showFlash("تم الحذف", "error");
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  document.getElementById("syncIcon").innerHTML = syncSVG();
  if (!configured) document.getElementById("setupBanner").style.display = "flex";

  doctors = readCache();
  render();

  if (configured) {
    setSyncStatus("syncing");
    try {
      doctors = await apiLoad();
      writeCache(doctors);
      setSyncStatus("ok");
      render();
    } catch { setSyncStatus("err"); }
  }
}

init();
</script>
</body>
</html>
